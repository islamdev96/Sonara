<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d6cff"/>
      <stop offset="1" stop-color="#9b5cff"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9e4ff"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1a0b3a" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <g filter="url(#sh)">
    <!-- sonar arcs -->
    <path d="M150 256a106 106 0 0 1 212 0" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="14" stroke-linecap="round"/>
    <path d="M110 256a146 146 0 0 1 292 0" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="14" stroke-linecap="round"/>
    <!-- equalizer bars -->
    <g fill="url(#bar)">
      <rect x="168" y="212" width="30" height="88"  rx="15"/>
      <rect x="214" y="168" width="30" height="176" rx="15"/>
      <rect x="260" y="140" width="30" height="232" rx="15"/>
      <rect x="306" y="188" width="30" height="136" rx="15"/>
    </g>
  </g>
</svg>
